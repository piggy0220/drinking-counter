<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍻 喝酒计数器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(102,126,234,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(118,75,162,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(255,107,107,0.15) 0%, transparent 60%),
    linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  background-attachment: fixed;
  min-height:100vh;
  padding:20px;
  padding-bottom:100px;
  color:#fff;
}

.container{max-width:480px;margin:0 auto}

.title{
  text-align:center;
  font-size:1.6rem;
  font-weight:bold;
  margin-bottom:8px;
  text-shadow:0 2px 8px rgba(0,0,0,0.6);
}
.subtitle{
  text-align:center;
  font-size:0.85rem;
  opacity:0.85;
  margin-bottom:24px;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
}

/* 设置页 */
.page{display:none}
.page.active{display:block}

.card{
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:25px 20px;
  border:1px solid rgba(255,255,255,0.15);
  margin-bottom:16px;
}
.card-title{
  font-size:1.1rem;
  font-weight:bold;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card-title small{
  font-size:0.8rem;
  opacity:0.6;
  font-weight:normal;
}

.input-group{margin-bottom:14px}
.input-label{
  font-size:0.85rem;
  opacity:0.75;
  margin-bottom:8px;
  display:block;
}
.input{
  width:100%;
  height:50px;
  text-align:center;
  border-radius:12px;
  border:2px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.1);
  color:#fff;
  font-size:1.3rem;
  font-weight:bold;
  outline:none;
}
.input:focus{border-color:rgba(255,255,255,0.4)}

.person-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.person-info{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
}
.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.1rem;
  font-weight:bold;
}
.person-name{font-size:1rem;font-weight:500}
.delete-btn{
  width:36px;height:36px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#ff6b6b;font-size:1.3rem;cursor:pointer;
  background:rgba(255,255,255,0.1);
}
.add-btn{
  display:flex;align-items:center;justify-content:center;
  padding:12px;
  color:#4cd964;
  font-size:0.95rem;font-weight:500;
  cursor:pointer;
  border-radius:12px;
  border:2px dashed rgba(76,217,100,0.3);
  margin-top:10px;
}
.empty-tip{
  text-align:center;
  opacity:0.5;
  font-size:0.85rem;
  padding:20px 0;
}

.main-btn{
  width:100%;
  height:52px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  font-size:1.05rem;
  font-weight:600;
  cursor:pointer;
  margin-top:6px;
}
.main-btn:disabled{
  background:rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.4);
  cursor:not-allowed;
}

/* 计数页 */

/* 每个人的计数卡片 */
.player-card{
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px 16px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,0.1);
}
.player-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.player-name{
  display:flex;align-items:center;gap:10px;
  font-size:1.05rem;font-weight:500;
}
.player-avatar{
  width:36px;height:36px;
  border-radius:50%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
}
.player-status{
  font-size:0.8rem;
  opacity:0.6;
}

/* 中间大字 + 左右控制 */
.player-board{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin-top:10px;
}
.control-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  min-width:70px;
}
.control-label{
  font-size:0.7rem;
  opacity:0.65;
}
.control-row{
  display:flex;
  align-items:center;
  gap:4px;
}
.control-row input{
  width:48px;
  height:36px;
  text-align:center;
  border-radius:8px;
  border:2px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);
  color:#fff;
  font-size:0.95rem;
  outline:none;
}
.btn{
  width:30px;height:30px;
  border-radius:50%;
  border:none;
  font-size:1rem;
  font-weight:bold;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s;
}
.btn:active{transform:scale(0.92)}
.btn-small{
  background:rgba(255,255,255,0.2);
  color:#fff;
}

.player-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  flex:1;
  text-align:center;
}
.player-mouth{
  font-size:2.6rem;
  font-weight:bold;
  background:linear-gradient(135deg,#ffd700,#ffb347);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.player-mouth-label{
  font-size:0.7rem;
  opacity:0.6;
}
.player-cup-info{
  font-size:0.75rem;
  opacity:0.8;
  margin-top:2px;
  color:#4cd964;
}

.action-btn{
  width:100%;
  height:34px;
  border-radius:10px;
  border:none;
  font-size:0.85rem;
  font-weight:600;
  cursor:pointer;
  transition:transform 0.15s;
  margin-top:4px;
}
.action-btn:active{transform:scale(0.95)}
.btn-drink{
  background:linear-gradient(135deg,#ff6b6b,#ee5a5a);
  color:#fff;
}
.btn-add{
  background:linear-gradient(135deg,#4cd964,#34c759);
  color:#fff;
}

.bottom-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:12px 20px 24px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  display:flex;
  gap:12px;
  border-top:1px solid rgba(255,255,255,0.1);
}
.bottom-bar .btn-bar{
  flex:1;
  height:46px;
  border-radius:12px;
  border:none;
  font-size:0.95rem;
  font-weight:500;
  cursor:pointer;
}
.btn-reset-bar{
  background:rgba(255,255,255,0.12);
  color:#fff;
}
.btn-back-bar{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
}

@media(max-width:400px){
  .title{font-size:1.3rem}
  .player-mouth{font-size:2.2rem}
  .stats-card .big-number{font-size:2.8rem}
  .player-board{gap:10px}
}
</style>
</head>
<body>

<!-- 设置页 -->
<div class="page active" id="setup-page">
  <div class="container">
    <div class="title">🍻 喝酒计数器</div>
    <div class="subtitle">聚会必备，公平喝酒</div>

    <div class="card">
      <div class="card-title">🍺 设置每杯口数</div>
      <div class="input-group">
        <label class="input-label">每人每杯几口</label>
        <input type="number" class="input" id="total-sips" value="50" min="1">
      </div>
    </div>

    <div class="card">
      <div class="card-title">👥 喝酒的人 <small id="people-count">(0/10)</small></div>
      <div class="person-list" id="people-list">
        <div class="empty-tip">还没加人呢，快叫上酒友！</div>
      </div>
      <div class="add-btn" id="add-person-btn"><span>+</span> 添加酒友</div>
    </div>

    <button class="main-btn" id="start-btn">开始喝！</button>
  </div>
</div>

<!-- 计数页 -->
<div class="page" id="counter-page">
  <div class="container">
    <div class="title">🍻 喝酒计数器</div>
    <div class="subtitle">聚会必备，公平喝酒</div>

    <!-- 每个人的卡片 -->
    <div id="player-cards"></div>
  </div>

  <div class="bottom-bar">
    <button class="btn-bar btn-reset-bar" id="reset-btn">🔄 换一杯</button>
    <button class="btn-bar btn-back-bar" id="back-btn">⚙️ 修改设置</button>
  </div>
</div>

<script>
let totalSips = 50;
let people = [];
let nextId = 1;
let defaultDelta = 5;

function loadData(){
  const saved = localStorage.getItem('drinkingCounterV2');
  if(saved){
    const d = JSON.parse(saved);
    totalSips = d.totalSips || 50;
    people = (d.people || []).map(p => ({...p, cups: p.cups || 0, sips: p.sips || 0}));
    nextId = d.nextId || 1;
  }
}

function saveData(){
  localStorage.setItem('drinkingCounterV2', JSON.stringify({totalSips, people, nextId}));
}

function getAvatarEmoji(name, remain){
  if(remain <= 0) return '😵';
  if(remain <= totalSips * 0.2) return '😰';
  const emojis = ['🧑','👨','👩','🧒','👴','👵','🧔','👱','🧕','🦸'];
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = (hash + name.charCodeAt(i)) % emojis.length;
  return emojis[hash];
}

/* ========== 设置页 ========== */
function renderSetup(){
  document.getElementById('total-sips').value = totalSips;
  document.getElementById('people-count').textContent = `(${people.length}/10)`;
  const list = document.getElementById('people-list');
  if(people.length === 0){
    list.innerHTML = '<div class="empty-tip">还没加人呢，快叫上酒友！</div>';
  } else {
    list.innerHTML = people.map(p => `
      <div class="person-item">
        <div class="person-info">
          <div class="avatar">${getAvatarEmoji(p.name, totalSips)}</div>
          <span class="person-name">${p.name}</span>
        </div>
        <div class="delete-btn" data-id="${p.id}">×</div>
      </div>
    `).join('');
  }
  document.getElementById('add-person-btn').style.display = people.length >= 10 ? 'none' : 'flex';
  const btn = document.getElementById('start-btn');
  btn.disabled = people.length === 0;
  btn.textContent = people.length > 0 ? '开始喝！' : '先加人吧';
}

/* ========== 计数页 ========== */
function renderCounter(){
  // 渲染每个人的卡片
  document.getElementById('player-cards').innerHTML = people.map(p => {
    const sips = p.sips || 0;
    const cups = p.cups || 0;
    const remain = Math.max(0, totalSips - sips);
    const totalDrank = cups * totalSips + sips;
    const emoji = getAvatarEmoji(p.name, remain);
    const avatarGrad = remain <= 0
      ? 'linear-gradient(135deg,#ff6b6b,#ee5a5a)'
      : remain <= totalSips * 0.2
        ? 'linear-gradient(135deg,#f39c12,#e67e22)'
        : 'linear-gradient(135deg,#667eea,#764ba2)';

    return `
    <div class="player-card">
      <div class="player-header">
        <div class="player-name">
          <div class="player-avatar" style="background:${avatarGrad}">${emoji}</div>
          <span>${p.name}</span>
        </div>
        <div class="player-status">累计 ${totalDrank} 口 · 第 ${cups+1} 杯</div>
      </div>
      <div class="player-board">
        <!-- 左侧：减去 -->
        <div class="control-box">
          <div class="control-label">减去</div>
          <div class="control-row">
            <button class="btn btn-small" onclick="adj(${p.id}, -1, 'left')">−</button>
            <input type="number" value="${defaultDelta}" min="1" id="left-${p.id}" onkeypress="if(event.key==='Enter')drink(${p.id})">
            <button class="btn btn-small" onclick="adj(${p.id}, 1, 'left')">+</button>
          </div>
          <button class="action-btn btn-drink" onclick="drink(${p.id})">喝！</button>
        </div>

        <!-- 中间：口数大字 -->
        <div class="player-center">
          <div class="player-mouth" id="mouth-${p.id}">${remain}</div>
          <div class="player-mouth-label">剩余口数</div>
          <div class="player-cup-info">第 ${cups+1} 杯 · 累计 ${totalDrank} 口</div>
        </div>

        <!-- 右侧：加上 -->
        <div class="control-box">
          <div class="control-label">加上</div>
          <div class="control-row">
            <button class="btn btn-small" onclick="adj(${p.id}, -1, 'right')">−</button>
            <input type="number" value="${defaultDelta}" min="1" id="right-${p.id}" onkeypress="if(event.key==='Enter')add(${p.id})">
            <button class="btn btn-small" onclick="adj(${p.id}, 1, 'right')">+</button>
          </div>
          <button class="action-btn btn-add" onclick="add(${p.id})">加！</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ========== 交互 ========== */
function adj(id, delta, side){
  const el = document.getElementById(side + '-' + id);
  el.value = Math.max(1, parseInt(el.value || 0) + delta);
}

function drink(id){
  const val = parseInt(document.getElementById('left-' + id).value || 0);
  const p = people.find(p => p.id === id);
  if(!p) return;
  const currentRemain = Math.max(0, totalSips - (p.sips || 0));
  const newRemain = Math.max(0, currentRemain - val);
  p.sips = totalSips - newRemain;
  // 当前杯喝完，自动进入下一杯
  if(newRemain === 0){
    p.cups = (p.cups || 0) + 1;
    p.sips = 0;
  }
  saveData();
  renderCounter();
}

function add(id){
  const val = parseInt(document.getElementById('right-' + id).value || 0);
  const p = people.find(p => p.id === id);
  if(!p) return;
  const currentRemain = Math.max(0, totalSips - (p.sips || 0));
  p.sips = totalSips - (currentRemain + val);
  saveData();
  renderCounter();
}

// 直接修改剩余口数（输入框失去焦点时）
function setRemain(id, newVal){
  const p = people.find(p => p.id === id);
  if(p){
    const remain = Math.max(0, parseInt(newVal) || 0);
    p.sips = totalSips - remain;
    saveData();
    renderCounter();
  }
}

document.addEventListener('click', e => {
  // 删除酒友
  if(e.target.classList.contains('delete-btn')){
    const id = parseInt(e.target.dataset.id);
    people = people.filter(p => p.id !== id);
    saveData();
    renderSetup();
  }
  // 添加酒友
  if(e.target.closest('#add-person-btn')){
    if(people.length >= 10) return alert('最多10人');
    const name = prompt('输入酒友名字：');
    if(name?.trim()){
      people.push({id: nextId++, name: name.trim(), sips: 0, cups: 0});
      saveData();
      renderSetup();
    }
  }
  // 开始喝
  if(e.target.id === 'start-btn'){
    const v = parseInt(document.getElementById('total-sips').value) || 0;
    if(v <= 0) return alert('口数要大于0');
    totalSips = v;
    saveData();
    renderCounter();
    showPage('counter-page');
  }
  // 换一杯（所有人新开一杯，cups+1）
  if(e.target.id === 'reset-btn'){
    if(confirm('所有人新开一杯？')){
      people.forEach(p => { p.cups = (p.cups || 0) + 1; p.sips = 0; });
      saveData();
      renderCounter();
    }
  }
  // 修改设置
  if(e.target.id === 'back-btn'){
    showPage('setup-page');
    renderSetup();
  }
});

loadData();
renderSetup();
</script>

</body>
</html>
